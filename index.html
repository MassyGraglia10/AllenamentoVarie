<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max&Lili Wellness</title>
    <style>
        :root { 
            --bg: #f4f7f6; --card: #ffffff; --text: #2d3436;
            --max-primary: #0984e3; --lili-primary: #d63031;
            --well-primary: #10ac84;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; line-height: 1.4; }
        .header { text-align: center; padding: 20px; background: white; box-shadow: var(--shadow); border-bottom: 1px solid #dfe6e9; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .user-selector { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-user { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; color: white; transition: 0.3s; font-size: 0.95rem; letter-spacing: 1px; }
        .btn-max { background: var(--max-primary); box-shadow: 0 4px 10px rgba(9, 132, 227, 0.3); }
        .btn-lili { background: var(--lili-primary); box-shadow: 0 4px 10px rgba(214, 48, 49, 0.3); }
        .btn-user.active { transform: scale(0.95); outline: 3px solid #2d3436; }

        #main-content { display: none; }
        .workout-section { display: none; }
        .workout-section.active { display: block; animation: slideUp 0.4s ease-out; }

        .card { background: var(--card); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 18px; border: 1px solid rgba(0,0,0,0.03); }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #636e72; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }

        /* CALENDARIO */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-day { padding: 10px 0; font-size: 0.8rem; border-radius: 10px; background: #f1f2f6; cursor: pointer; border: 1px solid #eee; position: relative; }
        .cal-day.done { background: #2ecc71 !important; color: white; font-weight: bold; border-color: #27ae60; }
        .cal-day.has-note::after { content: '●'; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); color: white; font-size: 8px; }
        .btn-cal { background: #dfe6e9; border: none; border-radius: 8px; cursor: pointer; padding: 6px 12px; font-weight: bold; }

        /* GRIGLIE E LINK */
        .grid-compact { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; }
        .btn-link { padding: 12px 8px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-align: center; background: #f1f2f6; color: #2d3436; border: 1px solid #dfe6e9; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .well-link { border-left: 4px solid var(--well-primary); background: #f0fff4; }

        /* MODALE */
        #note-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 85%; max-width: 380px; }
        textarea { width: 100%; border: 1px solid #dfe6e9; border-radius: 12px; padding: 12px; box-sizing: border-box; margin: 15px 0; font-family: inherit; background: #f9f9f9; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.3rem; letter-spacing: -0.5px;">✨ MAX&LILI <span style="color:var(--well-primary)">WELLNESS</span></h1>
</div>

<div class="container">
    <div class="user-selector">
        <button id="btn-max" class="btn-user btn-max" onclick="showWorkout('max')">MASSIMO</button>
        <button id="btn-lili" class="btn-user btn-lili" onclick="showWorkout('lili')">LILIANA</button>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="cal-header">
                <button class="btn-cal" onclick="changeMonth(-1)">❮</button>
                <div id="current-month-display" style="font-weight:800; font-size:0.95rem;">MESE</div>
                <button class="btn-cal" onclick="changeMonth(1)">❯</button>
            </div>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="card" style="text-align:center;">
            <div id="display" style="font-size: 2.5rem; font-weight: 900; margin: 5px 0;">90s</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="toggleTimer()" id="tBtn" style="background:#2ecc71; color:white; border:none; padding:10px 25px; border-radius:10px; font-weight:bold;">START</button>
                <button onclick="resetTimer()" style="background:#b2bec3; color:white; border:none; padding:10px 25px; border-radius:10px; font-weight:bold;">RESET</button>
            </div>
        </div>

        <div class="card" id="playlist-card" style="display:none;">
            <div class="section-title">🎵 Sound Performance</div>
            <div id="music-grid" class="grid-compact"></div>
            <div style="font-size: 0.6rem; color: #d63031; cursor: pointer; text-align: right; margin-top:10px;" onclick="clearMusic()">Reset musica</div>
        </div>

        <div id="content-max" class="workout-section">
            <div class="card">
                <div class="section-title">📋 Scheda Massimo</div>
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" style="width:100%; border-radius:12px; margin-bottom:15px;">
                <div class="grid-compact">
                    <a href="https://www.youtube.com/results?search_query=plank+tutorial" target="_blank" class="btn-link">PLANK</a>
                    <a href="https://www.youtube.com/results?search_query=lat+machine+tutorial" target="_blank" class="btn-link">LAT MACHINE</a>
                    <a href="https://www.youtube.com/results?search_query=pullover+tutorial" target="_blank" class="btn-link">PULLOVER</a>
                    <a href="https://www.youtube.com/results?search_query=piegamenti+tutorial" target="_blank" class="btn-link">PIEGAMENTI</a>
                </div>
            </div>
        </div>

        <div id="content-lili" class="workout-section">
            <div class="card">
                <div class="section-title">📋 Scheda Liliana</div>
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" style="width:100%; border-radius:12px; margin-bottom:15px;">
                <div class="grid-compact">
                    <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="btn-link">CRUNCH</a>
                    <a href="https://www.youtube.com/results?search_query=leg+press" target="_blank" class="btn-link">PRESSA</a>
                    <a href="https://www.youtube.com/results?search_query=goblet+squat" target="_blank" class="btn-link">SQUAT GOBLET</a>
                    <a href="https://www.youtube.com/results?search_query=chest+press" target="_blank" class="btn-link">CHEST PRESS</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title" style="color:var(--well-primary);">🌿 Wellness & Recovery</div>
            <div class="grid-compact">
                <a href="https://www.youtube.com/results?search_query=yoga+vinyasa+italiano" target="_blank" class="btn-link well-link">🧘 Yoga Flow</a>
                <a href="https://www.youtube.com/results?search_query=meditazione+guidata+italiano" target="_blank" class="btn-link well-link">🧠 Mind</a>
                <a href="https://www.youtube.com/results?search_query=stretching+full+body+italiano" target="_blank" class="btn-link well-link">📏 Stretch</a>
                <a href="https://www.youtube.com/results?search_query=respirazione+diaframmatica" target="_blank" class="btn-link well-link">🌬️ Breath</a>
            </div>
        </div>

        <div class="card">
            <div class="section-title">➕ Aggiungi Playlist</div>
            <input type="text" id="mTitle" placeholder="Titolo (es. Rock)" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:8px; box-sizing:border-box;">
            <div style="display:flex; gap:8px;">
                <input type="text" id="mLink" placeholder="Link Spotify o YouTube..." style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
                <button onclick="addMusic()" style="background:var(--max-primary); color:white; border:none; border-radius:10px; padding:0 20px; font-weight:bold;">OK</button>
            </div>
        </div>
    </div>
</div>

<div id="note-modal">
    <div class="modal-content">
        <h3 id="modal-date" style="margin-top:0;">Giorno</h3>
        <textarea id="note-text" rows="4" placeholder="Note allenamento..."></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveNote()" style="background:#2ecc71; color:white; border:none; padding:12px; border-radius:10px; flex:1; font-weight:bold;">SALVA</button>
            <button onclick="closeModal()" style="background:#b2bec3; color:white; border:none; padding:12px; border-radius:10px; flex:1; font-weight:bold;">CHIUDI</button>
        </div>
        <button onclick="deleteNote()" style="width:100%; background:none; border:none; color:red; margin-top:20px; font-size:0.75rem; text-decoration:underline;">Elimina allenamento</button>
    </div>
</div>

<script>
    let currentUser = "";
    let selectedDay = null;
    let viewDate = new Date();

    function showWorkout(user) {
        currentUser = user;
        document.getElementById('main-content').style.display = 'block';
        document.querySelectorAll('.workout-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + user).classList.add('active');
        document.getElementById('btn-' + user).classList.add('active');
        renderCalendar();
        renderPlaylist();
    }

    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = "";
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('current-month-display').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(viewDate).toUpperCase();
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        let offset = firstDay === 0 ? 6 : firstDay - 1;
        for(let j=0; j<offset; j++) container.appendChild(document.createElement('div'));
        const data = JSON.parse(localStorage.getItem(`data_${currentUser}_${m}_${y}`) || "{}");
        for (let i = 1; i <= daysInMonth; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day' + (data[i] ? ' done' : '') + (data[i] && data[i].text ? ' has-note' : '');
            day.innerText = i;
            day.onclick = () => openModal(i);
            container.appendChild(day);
        }
    }

    function changeMonth(v) { viewDate.setMonth(viewDate.getMonth() + v); renderCalendar(); }
    function openModal(d) {
        selectedDay = d;
        const data = JSON.parse(localStorage.getItem(`data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`) || "{}");
        document.getElementById('modal-date').innerText = d + " " + document.getElementById('current-month-display').innerText;
        document.getElementById('note-text').value = data[d] ? data[d].text : "";
        document.getElementById('note-modal').style.display = 'flex';
    }

    function saveNote() {
        const key = `data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`;
        let data = JSON.parse(localStorage.getItem(key) || "{}");
        data[selectedDay] = { text: document.getElementById('note-text').value };
        localStorage.setItem(key, JSON.stringify(data));
        closeModal(); renderCalendar();
    }

    function deleteNote() {
        const key = `data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`;
        let data = JSON.parse(localStorage.getItem(key) || "{}");
        delete data[selectedDay];
        localStorage.setItem(key, JSON.stringify(data));
        closeModal(); renderCalendar();
    }
    function closeModal() { document.getElementById('note-modal').style.display = 'none'; }

    function addMusic() {
        const title = document.getElementById('mTitle').value || "Playlist";
        const link = document.getElementById('mLink').value;
        if(link) {
            let list = JSON.parse(localStorage.getItem('playlist_final_' + currentUser) || "[]");
            list.push({ title: title.toUpperCase(), link: link });
            localStorage.setItem('playlist_final_' + currentUser, JSON.stringify(list));
            document.getElementById('mTitle').value = ""; document.getElementById('mLink').value = "";
            renderPlaylist();
        }
    }

    function renderPlaylist() {
        const list = JSON.parse(localStorage.getItem('playlist_final_' + currentUser) || "[]");
        const container = document.getElementById('music-grid');
        const color = currentUser === 'max' ? 'var(--max-primary)' : 'var(--lili-primary)';
        if(list.length > 0) {
            document.getElementById('playlist-card').style.display = 'block';
            container.innerHTML = list.map(item => `<a class="btn-link" style="background:${color}; color:white;" href="${item.link}" target="_blank">${item.title}</a>`).join('');
        } else document.getElementById('playlist-card').style.display = 'none';
    }

    function clearMusic() { localStorage.removeItem('playlist_final_' + currentUser); renderPlaylist(); }

    let timeLeft = 90, timer, running = false;
    function toggleTimer() {
        if(!running) { 
            timer = setInterval(() => { if(timeLeft > 0){ timeLeft--; document.getElementById('display').innerText = timeLeft + 's'; } else { clearInterval(timer); resetTimer(); alert('Recupero terminato!'); } }, 1000); 
            document.getElementById('tBtn').innerText = 'PAUSE'; 
        } else { clearInterval(timer); document.getElementById('tBtn').innerText = 'START'; }
        running = !running;
    }
    function resetTimer() { clearInterval(timer); timeLeft = 90; running = false; document.getElementById('display').innerText = '90s'; document.getElementById('tBtn').innerText = 'START'; }
</script>
</body>
</html>
