<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max&Lili Wellness Pro</title>
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --text: #2d3436;
            --max-primary: #0984e3; --lili-primary: #d63031;
            --well-primary: #10ac84; --track-primary: #6c5ce7;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .header { text-align: center; padding: 20px; background: white; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .user-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-user { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; color: white; font-size: 0.95rem; }
        .btn-max { background: var(--max-primary); }
        .btn-lili { background: var(--lili-primary); }
        .btn-user.active { outline: 3px solid #2d3436; transform: scale(0.96); }

        #main-content { display: none; }
        .workout-section { display: none; }
        .workout-section.active { display: block; }

        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #636e72; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }

        /* TRACKER FISICO */
        .stats-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-field { background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #eee; }
        .stat-field label { display: block; font-size: 0.65rem; font-weight: bold; color: #888; margin-bottom: 4px; }
        .stat-field input { width: 100%; border: none; background: transparent; font-size: 1rem; font-weight: bold; outline: none; }
        
        .history-list { font-size: 0.75rem; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; }

        /* CALENDARIO & GRIGLIE */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-day { padding: 10px 0; font-size: 0.8rem; border-radius: 10px; background: #f1f2f6; cursor: pointer; position: relative; }
        .cal-day.done { background: #2ecc71 !important; color: white; font-weight: bold; }
        .grid-compact { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; }
        .btn-link { padding: 12px 8px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-align: center; background: #f1f2f6; color: #2d3436; border: 1px solid #dfe6e9; display: flex; align-items: center; justify-content: center; min-height: 45px; }

        /* MODALE */
        #note-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 85%; max-width: 380px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.2rem;">✨ MAX&LILI <span style="color:var(--well-primary)">WELLNESS PRO</span></h1>
</div>

<div class="container">
    <div class="user-selector">
        <button id="btn-max" class="btn-user btn-max" onclick="showWorkout('max')">MASSIMO</button>
        <button id="btn-lili" class="btn-user btn-lili" onclick="showWorkout('lili')">LILIANA</button>
    </div>

    <div id="main-content">
        <div class="card" style="border-top: 4px solid var(--track-primary);">
            <div class="section-title" style="color:var(--track-primary);">📊 Body & Health Tracker</div>
            <div class="stats-input-grid">
                <div class="stat-field"><label>PESO (KG)</label><input type="number" id="body-weight" step="0.1" placeholder="00.0"></div>
                <div class="stat-field"><label>VITA (CM)</label><input type="number" id="body-waist" placeholder="00"></div>
                <div class="stat-field"><label>BATTITO RIPOSO</label><input type="number" id="body-hr" placeholder="60"></div>
                <div class="stat-field"><label>% GRASSO (EST)</label><input type="number" id="body-fat" placeholder="15%"></div>
            </div>
            <button onclick="savePhysicalStats()" style="width:100%; padding:12px; background:var(--track-primary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom:15px;">REGISTRA MISURAZIONI</button>
            
            <div class="history-list" id="stats-history">
                </div>
        </div>

        <div class="card">
            <div class="section-title">📅 Allenamenti Mensili</div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <div class="card" style="text-align:center;">
            <div id="display" style="font-size: 2rem; font-weight: 900; color: #2d3436;">90s</div>
            <button onclick="toggleTimer()" id="tBtn" style="background:#2ecc71; color:white; border:none; padding:8px 20px; border-radius:10px; font-weight:bold; margin-top:5px;">START TIMER</button>
        </div>

        <div id="content-max" class="workout-section">
            <div class="card">
                <div class="section-title">📋 Scheda Massimo</div>
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" style="width:100%; border-radius:12px; margin-bottom:10px;">
                <div class="grid-compact">
                    <a href="https://www.youtube.com/results?search_query=plank+tutorial" target="_blank" class="btn-link">PLANK</a>
                    <a href="https://www.youtube.com/results?search_query=lat+machine+tutorial" target="_blank" class="btn-link">LAT MACHINE</a>
                </div>
            </div>
        </div>

        <div id="content-lili" class="workout-section">
            <div class="card">
                <div class="section-title">📋 Scheda Liliana</div>
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" style="width:100%; border-radius:12px; margin-bottom:10px;">
                <div class="grid-compact">
                    <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="btn-link">CRUNCH</a>
                    <a href="https://www.youtube.com/results?search_query=leg+press" target="_blank" class="btn-link">PRESSA</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title" style="color:var(--well-primary);">🌿 Wellness & Mind</div>
            <div class="grid-compact">
                <a href="https://www.youtube.com/results?search_query=yoga+vinyasa+italiano" target="_blank" class="btn-link" style="border-left:4px solid var(--well-primary)">🧘 Yoga</a>
                <a href="https://www.youtube.com/results?search_query=meditazione+guidata" target="_blank" class="btn-link" style="border-left:4px solid var(--well-primary)">🧠 Mind</a>
            </div>
        </div>
    </div>
</div>

<div id="note-modal">
    <div class="modal-content">
        <h3 id="modal-date">Data</h3>
        <textarea id="note-text" rows="4" style="width:100%; margin:15px 0; border-radius:10px; padding:10px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveNote()" style="flex:1; padding:12px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:bold;">SALVA</button>
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#b2bec3; color:white; border:none; border-radius:10px;">CHIUDI</button>
        </div>
    </div>
</div>

<script>
    let currentUser = "";
    let viewDate = new Date();

    function showWorkout(user) {
        currentUser = user;
        document.getElementById('main-content').style.display = 'block';
        document.querySelectorAll('.workout-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + user).classList.add('active');
        document.getElementById('btn-' + user).classList.add('active');
        renderCalendar();
        renderStatsHistory();
    }

    // GESTIONE STATISTICHE FISICHE
    function savePhysicalStats() {
        const weight = document.getElementById('body-weight').value;
        const waist = document.getElementById('body-waist').value;
        const hr = document.getElementById('body-hr').value;
        const fat = document.getElementById('body-fat').value;
        
        if(!weight) return alert("Inserisci almeno il peso!");

        const newEntry = {
            date: new Date().toLocaleDateString('it-IT'),
            weight: weight,
            waist: waist,
            hr: hr,
            fat: fat
        };

        let history = JSON.parse(localStorage.getItem(`stats_${currentUser}`) || "[]");
        history.unshift(newEntry); // Aggiungi in testa
        localStorage.setItem(`stats_${currentUser}`, JSON.stringify(history.slice(0, 20))); // Tieni ultime 20
        
        renderStatsHistory();
        alert("Dati salvati con successo!");
    }

    function renderStatsHistory() {
        const history = JSON.parse(localStorage.getItem(`stats_${currentUser}`) || "[]");
        const container = document.getElementById('stats-history');
        if(history.length === 0) {
            container.innerHTML = "<p style='color:#999; text-align:center;'>Nessun dato registrato</p>";
            return;
        }
        container.innerHTML = history.map(entry => `
            <div class="history-item">
                <span><strong>${entry.date}</strong></span>
                <span>${entry.weight}kg | Vita: ${entry.waist}cm | HR: ${entry.hr}</span>
            </div>
        `).join('');
    }

    // CALENDARIO SEMPLICE
    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = "";
        const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        const data = JSON.parse(localStorage.getItem(`data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`) || "{}");
        
        for (let i = 1; i <= daysInMonth; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day' + (data[i] ? ' done' : '');
            day.innerText = i;
            day.onclick = () => openModal(i);
            container.appendChild(day);
        }
    }

    function openModal(d) {
        selectedDay = d;
        document.getElementById('modal-date').innerText = d + " Workout";
        document.getElementById('note-modal').style.display = 'flex';
    }

    function saveNote() {
        const key = `data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`;
        let data = JSON.parse(localStorage.getItem(key) || "{}");
        data[selectedDay] = { text: document.getElementById('note-text').value };
        localStorage.setItem(key, JSON.stringify(data));
        closeModal(); renderCalendar();
    }
    function closeModal() { document.getElementById('note-modal').style.display = 'none'; }

    // TIMER
    let timeLeft = 90, timer, running = false;
    function toggleTimer() {
        if(!running) {
            timer = setInterval(() => { 
                if(timeLeft > 0){ timeLeft--; document.getElementById('display').innerText = timeLeft + 's'; }
                else { clearInterval(timer); timeLeft = 90; running = false; alert("Recupero finito!"); }
            }, 1000);
            document.getElementById('tBtn').innerText = "PAUSE";
        } else { clearInterval(timer); document.getElementById('tBtn').innerText = "START"; }
        running = !running;
    }
</script>
</body>
</html>
