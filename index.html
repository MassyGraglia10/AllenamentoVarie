<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Hub - Max & Lili</title>
    <style>
        :root { 
            --bg: #0f1113; --card: #1a1d21; --max-color: #2196f3; 
            --lili-color: #e91e63; --text: #eceff1; --accent: #ff9800; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 1px; }
        .header p { color: #888; font-size: 0.9rem; }

        /* Selettore Utente */
        .selector-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .user-btn { 
            flex: 1; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; 
            transition: all 0.3s ease; font-size: 1rem; color: white; opacity: 0.3;
        }
        .btn-max { background: linear-gradient(135deg, #1e88e5, #1565c0); }
        .btn-lili { background: linear-gradient(135deg, #d81b60, #ad1457); }
        .user-btn.active { opacity: 1; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border: 2px solid white; }

        /* Sezioni Scheda */
        .workout-content { display: none; }
        .workout-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .image-container { position: relative; margin-bottom: 25px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scheda-img { width: 100%; display: block; filter: brightness(0.9); transition: 0.3s; }
        .scheda-img:hover { filter: brightness(1); }

        /* Video Tutorial */
        .section-label { 
            display: flex; align-items: center; gap: 10px; color: var(--accent); 
            font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
        }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .video-card { 
            background: var(--card); border: 1px solid #333; color: white; padding: 15px; 
            border-radius: 12px; text-decoration: none; text-align: center; font-size: 0.85rem; 
            font-weight: 600; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .video-card:active { background: #333; transform: scale(0.95); }

        .footer-note { text-align: center; margin-top: 40px; padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏋️ WORKOUT HUB</h1>
    <p>Massimo & Liliana - Training Sessions</p>
</div>

<div class="selector-container">
    <button id="btn-max" class="user-btn btn-max" onclick="switchUser('max')">♂ Massimo</button>
    <button id="btn-lili" class="user-btn btn-lili" onclick="switchUser('lili')">♀ Liliana</button>
</div>

<div id="content-max" class="workout-content">
    <div class="image-container">
        <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" class="scheda-img" alt="Scheda Max">
    </div>
    
    <div class="section-label">🎬 Video Esecuzione</div>
    <div class="grid-videos">
        <a href="https://www.youtube.com/results?search_query=chest+fly+dumbbells" target="_blank" class="video-card">CHEST FLY</a>
        <a href="https://www.youtube.com/results?search_query=squat+bilanciere" target="_blank" class="video-card">SQUAT</a>
        <a href="https://www.youtube.com/results?search_query=rematore+manubrio" target="_blank" class="video-card">REMATORE</a>
        <a href="https://www.youtube.com/results?search_query=military+press" target="_blank" class="video-card">MILITARY PRESS</a>
        <a href="https://www.youtube.com/results?search_query=hammer+curl" target="_blank" class="video-card">HAMMER CURL</a>
        <a href="https://www.youtube.com/results?search_query=plank+corretto" target="_blank" class="video-card">PLANK</a>
    </div>
</div>

<div id="content-lili" class="workout-content">
    <div class="image-container">
        <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" class="scheda-img" alt="Scheda Lili">
    </div>

    <div class="section-label">🎬 Video Esecuzione</div>
    <div class="grid-videos">
        <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="video-card">1. CRUNCH</a>
        <a href="https://www.youtube.com/results?search_query=leg+press+machine" target="_blank" class="video-card">2. PRESSA</a>
        <a href="https://www.youtube.com/results?search_query=leg+extension+tutorial" target="_blank" class="video-card">3. LEG EXTENSION</a>
        <a href="https://www.youtube.com/results?search_query=goblet+squat+kettlebell" target="_blank" class="video-card">4. SQUAT GOBLET</a>
        <a href="https://www.youtube.com/results?search_query=chest+press+machine" target="_blank" class="video-card">CHEST PRESS</a>
        <a href="https://www.youtube.com/results?search_query=lat+machine+tutorial" target="_blank" class="video-card">LAT MACHINE</a>
    </div>
</div>

<div class="footer-note">
    © 2026 Training Sync • Massimo & Liliana
</div>

<script>
    function switchUser(user) {
        // Rimuovi classi active
        document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.workout-content').forEach(c => c.classList.remove('active'));

        // Attiva selezione
        document.getElementById('btn-' + user).classList.add('active');
        document.getElementById('content-' + user).classList.add('active');
        
        // Vibrazione feedback (se supportata)
        if (window.navigator.vibrate) window.navigator.vibrate(50);
    }
</script>

</body>
</html>
