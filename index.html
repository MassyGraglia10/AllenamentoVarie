<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Hub 365 - Max & Lili</title>
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21;
            --max-primary: #007bff; --lili-primary: #d63384;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { text-align: center; padding: 15px; background: white; box-shadow: var(--shadow); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .user-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-user { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; font-size: 0.9rem; }
        .btn-max { background: var(--max-primary); }
        .btn-lili { background: var(--lili-primary); }
        .btn-user.active { outline: 3px solid #333; transform: scale(0.96); }

        #main-content { display: none; }
        .workout-section { display: none; }
        .workout-section.active { display: block; animation: fadeIn 0.4s; }

        .card { background: var(--card); border-radius: 16px; padding: 15px; box-shadow: var(--shadow); margin-bottom: 15px; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }

        /* CALENDARIO ANNUALE */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; font-size: 0.75rem; border-radius: 8px; background: #f8f9fa; cursor: pointer; border: 1px solid #eee; position: relative; }
        .cal-day.done { background: #28a745 !important; color: white; font-weight: bold; }
        .cal-day.has-note::after { content: '•'; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); color: white; }
        .btn-cal { background: none; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; padding: 2px 8px; }

        /* MODALE */
        #note-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 350px; }

        /* PLAYER MUSICA INTEGRATO */
        #music-container { margin-top: 10px; border-radius: 12px; overflow: hidden; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; margin-bottom: 10px; }
        .song-btn { padding: 8px; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.65rem; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .v-link { background: #f0f2f5; padding: 10px; border-radius: 10px; text-decoration: none; color: #444; font-size: 0.7rem; font-weight: 700; text-align: center; border: 1px solid #e4e6eb; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.2rem;">💪 WORKOUT HUB 365</h1>
</div>

<div class="container">
    <div class="user-selector">
        <button id="btn-max" class="btn-user btn-max" onclick="showWorkout('max')">MASSIMO</button>
        <button id="btn-lili" class="btn-user btn-lili" onclick="showWorkout('lili')">LILIANA</button>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="cal-header">
                <button class="btn-cal" onclick="changeMonth(-1)">❮</button>
                <div id="current-month-display" style="font-weight:bold; font-size:0.9rem;">Mese Anno</div>
                <button class="btn-cal" onclick="changeMonth(1)">❯</button>
            </div>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="card" id="playlist-card" style="display:none;">
            <div class="section-title">Playlist Attiva</div>
            <div id="music-grid" class="music-grid"></div>
            <div id="music-player-box"></div>
            <div style="font-size: 0.6rem; color: #e74c3c; cursor: pointer; text-align: right; margin-top:5px;" onclick="clearMusic()">Reset musica</div>
        </div>

        <div class="card" style="text-align:center;">
            <div class="section-title">Timer Recupero</div>
            <div style="font-size: 2rem; font-weight: 900;" id="display">90s</div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:5px;">
                <button class="btn-act" style="background:#28a745; border-radius:5px; border:none; color:white; padding:5px 15px;" id="tBtn" onclick="toggleTimer()">START</button>
                <button class="btn-act" style="background:#6c757d; border-radius:5px; border:none; color:white; padding:5px 15px;" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div id="content-max" class="workout-section">
            <div class="card" style="text-align:center;">
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" style="width:100%; border-radius:10px;">
                <div class="section-title" style="margin-top:15px;">Video Tutorial</div>
                <div class="video-grid">
                    <a href="https://www.youtube.com/results?search_query=plank+tutorial" target="_blank" class="v-link">PLANK</a>
                    <a href="https://www.youtube.com/results?search_query=lat+machine+tutorial" target="_blank" class="v-link">LAT MACHINE</a>
                </div>
            </div>
        </div>

        <div id="content-lili" class="workout-section">
            <div class="card" style="text-align:center;">
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" style="width:100%; border-radius:10px;">
                <div class="section-title" style="margin-top:15px;">Video Tutorial</div>
                <div class="video-grid">
                    <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="v-link">CRUNCH</a>
                    <a href="https://www.youtube.com/results?search_query=leg+press" target="_blank" class="v-link">PRESSA</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Wellness</div>
            <div class="video-grid">
                <a href="https://www.youtube.com/results?search_query=yoga+italiano" target="_blank" class="v-link">🧘 YOGA</a>
                <a href="https://www.youtube.com/results?search_query=pilates+italiano" target="_blank" class="v-link">🤸 PILATES</a>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Aggiungi Spotify Playlist</div>
            <input type="text" id="mTitle" placeholder="Nome (es. Rock)" style="width:100%; margin-bottom:5px; padding:8px; border-radius:8px; border:1px solid #ddd;">
            <div style="display:flex; gap:5px;">
                <input type="text" id="mLink" placeholder="Incolla Link..." style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
                <button style="background:#007bff; color:white; border:none; border-radius:8px; padding:0 15px;" onclick="addMusic()">OK</button>
            </div>
        </div>
    </div>
</div>

<div id="note-modal">
    <div class="modal-content">
        <h3 id="modal-date" style="margin-top:0; font-size:1rem;">Giorno</h3>
        <textarea id="note-text" rows="4" style="width:100%; border-radius:8px; padding:10px; margin:10px 0; font-family:inherit;" placeholder="Note allenamento..."></textarea>
        <div style="display:flex; gap:10px;">
            <button style="background:#28a745; color:white; border:none; padding:10px; border-radius:8px; flex:1;" onclick="saveNote()">SALVA</button>
            <button style="background:#6c757d; color:white; border:none; padding:10px; border-radius:8px; flex:1;" onclick="closeModal()">CHIUDI</button>
        </div>
        <button onclick="deleteNote()" style="width:100%; background:none; border:none; color:red; margin-top:15px; font-size:0.7rem;">Elimina allenamento</button>
    </div>
</div>

<script>
    let currentUser = "";
    let selectedDay = null;
    let viewDate = new Date(); // Data corrente per navigazione calendario

    function showWorkout(user) {
        currentUser = user;
        document.getElementById('main-content').style.display = 'block';
        document.querySelectorAll('.workout-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + user).classList.add('active');
        document.getElementById('btn-' + user).classList.add('active');
        renderCalendar();
        renderPlaylist();
    }

    // CALENDARIO DINAMICO
    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = "";
        const month = viewDate.getMonth();
        const year = viewDate.getFullYear();
        
        document.getElementById('current-month-display').innerText = 
            new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(viewDate).toUpperCase();

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Offset per far iniziare il calendario correttamente (considerando Lunedì come primo giorno)
        let offset = firstDay === 0 ? 6 : firstDay - 1;
        for(let j=0; j<offset; j++) { container.appendChild(document.createElement('div')); }

        const storageKey = `data_${currentUser}_${month}_${year}`;
        const data = JSON.parse(localStorage.getItem(storageKey) || "{}");

        for (let i = 1; i <= daysInMonth; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day' + (data[i] ? ' done' : '') + (data[i] && data[i].text ? ' has-note' : '');
            day.innerText = i;
            day.onclick = () => openModal(i);
            container.appendChild(day);
        }
    }

    function changeMonth(val) {
        viewDate.setMonth(viewDate.getMonth() + val);
        renderCalendar();
    }

    function openModal(day) {
        selectedDay = day;
        const month = viewDate.getMonth();
        const year = viewDate.getFullYear();
        const storageKey = `data_${currentUser}_${month}_${year}`;
        const data = JSON.parse(localStorage.getItem(storageKey) || "{}");
        
        document.getElementById('modal-date').innerText = day + " " + document.getElementById('current-month-display').innerText;
        document.getElementById('note-text').value = data[day] ? data[day].text : "";
        document.getElementById('note-modal').style.display = 'flex';
    }

    function saveNote() {
        const storageKey = `data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`;
        let data = JSON.parse(localStorage.getItem(storageKey) || "{}");
        data[selectedDay] = { text: document.getElementById('note-text').value };
        localStorage.setItem(storageKey, JSON.stringify(data));
        closeModal(); renderCalendar();
    }

    function deleteNote() {
        const storageKey = `data_${currentUser}_${viewDate.getMonth()}_${viewDate.getFullYear()}`;
        let data = JSON.parse(localStorage.getItem(storageKey) || "{}");
        delete data[selectedDay];
        localStorage.setItem(storageKey, JSON.stringify(data));
        closeModal(); renderCalendar();
    }

    function closeModal() { document.getElementById('note-modal').style.display = 'none'; }

    // PLAYLIST CON PLAYER INTEGRATO
    function addMusic() {
        const title = document.getElementById('mTitle').value || "Playlist";
        let link = document.getElementById('mLink').value;
        
        if(link.includes("spotify.com")) {
            // Converte il link normale in link embed
            link = link.replace("spotify.com/", "spotify.com/embed/");
            let list = JSON.parse(localStorage.getItem('playlist_' + currentUser) || "[]");
            list.push({ title: title.toUpperCase(), link: link });
            localStorage.setItem('playlist_' + currentUser, JSON.stringify(list));
            renderPlaylist();
        } else {
            alert("Per favore usa un link di Spotify");
        }
    }

    function loadPlayer(link) {
        const box = document.getElementById('music-player-box');
        box.innerHTML = `<iframe src="${link}" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
    }

    function renderPlaylist() {
        const list = JSON.parse(localStorage.getItem('playlist_' + currentUser) || "[]");
        const container = document.getElementById('music-grid');
        const card = document.getElementById('playlist-card');
        const color = currentUser === 'max' ? 'var(--max-primary)' : 'var(--lili-primary)';
        
        if(list.length > 0) {
            card.style.display = 'block';
            container.innerHTML = list.map(item => 
                `<div class="song-btn" style="background:${color}; cursor:pointer;" onclick="loadPlayer('${item.link}')">${item.title}</div>`
            ).join('');
        } else { card.style.display = 'none'; }
    }

    function clearMusic() { 
        localStorage.removeItem('playlist_' + currentUser); 
        document.getElementById('music-player-box').innerHTML = "";
        renderPlaylist(); 
    }

    // TIMER RECUPERO
    let timeLeft = 90; let timer; let running = false;
    function toggleTimer() {
        if(!running) { 
            timer = setInterval(() => { if(timeLeft > 0){ timeLeft--; document.getElementById('display').innerText = timeLeft + 's'; } else { clearInterval(timer); resetTimer(); alert('Recupero finito!'); } }, 1000); 
            document.getElementById('tBtn').innerText = 'PAUSE'; 
        } else { clearInterval(timer); document.getElementById('tBtn').innerText = 'START'; }
        running = !running;
    }
    function resetTimer() { clearInterval(timer); timeLeft = 90; running = false; document.getElementById('display').innerText = '90s'; document.getElementById('tBtn').innerText = 'START'; }
</script>
</body>
</html>
