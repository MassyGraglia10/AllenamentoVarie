<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Hub - Max & Lili</title>
    <style>
        :root { 
            --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50;
            --max-color: #3498db; --lili-color: #e91e63;
            --yoga: #8e44ad; --pilates: #2980b9; --mind: #16a085;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
        .header { text-align: center; padding: 20px; background: white; box-shadow: var(--shadow); border-bottom: 2px solid #eee; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* CRONOMETRO RECUPERO */
        .timer-box { background: #2c3e50; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-around; }
        .timer-display { font-size: 2rem; font-weight: bold; font-family: monospace; }
        .timer-btn { background: #27ae60; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .timer-btn.stop { background: #e74c3c; }

        /* SELETTORE PROFILO */
        .user-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-user { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; opacity: 0.4; transition: 0.3s; }
        .btn-max { background: var(--max-color); }
        .btn-lili { background: var(--lili-color); }
        .btn-user.active { opacity: 1; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #fff; }

        /* CONTENUTI */
        .workout-section { display: none; }
        .workout-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid #eee; }
        .scheda-img { width: 100%; border-radius: 15px; border: 1px solid #ddd; }
        
        .section-label { color: #7f8c8d; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 15px; display: block; letter-spacing: 1px; }

        /* GRIGLIA VIDEO */
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .video-btn { background: #f8f9fa; border: 1px solid #eee; color: var(--text); padding: 12px; border-radius: 10px; text-decoration: none; text-align: center; font-size: 0.8rem; font-weight: 600; }
        .video-btn:hover { border-color: var(--max-color); background: #fff; }

        /* EXTRA */
        .extra-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-extra { padding: 15px; border-radius: 12px; text-decoration: none; color: white; text-align: center; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏋️ WORKOUT HUB</h1>
    <p style="margin:5px 0 0; color:#888;">Massimo & Liliana Training</p>
</div>

<div class="container">
    <div class="timer-box">
        <div><span class="section-label" style="color:#bdc3c7; margin:0;">Recupero</span></div>
        <div class="timer-display" id="display">01:30</div>
        <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">START</button>
        <button class="timer-btn stop" onclick="resetTimer()">RESET</button>
    </div>

    <div class="user-selector">
        <button id="tab-max" class="btn-user btn-max" onclick="showTab('max')">♂ Massimo</button>
        <button id="tab-lili" class="btn-user btn-lili" onclick="showTab('lili')">♀ Liliana</button>
    </div>

    <div id="content-max" class="workout-section">
        <div class="card">
            <span class="section-label">Scheda Massimo</span>
            <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" class="scheda-img">
        </div>
        <div class="card">
            <span class="section-label">Tutorial Esercizi</span>
            <div class="grid-videos">
                <a href="https://www.youtube.com/results?search_query=chest+fly+dumbbells" target="_blank" class="video-btn">CHEST FLY</a>
                <a href="https://www.youtube.com/results?search_query=squat+bilanciere" target="_blank" class="video-btn">SQUAT</a>
                <a href="https://www.youtube.com/results?search_query=rematore+manubrio" target="_blank" class="video-btn">REMATORE</a>
                <a href="https://www.youtube.com/results?search_query=military+press" target="_blank" class="video-btn">MILITARY PRESS</a>
            </div>
        </div>
    </div>

    <div id="content-lili" class="workout-section">
        <div class="card">
            <span class="section-label">Scheda Liliana</span>
            <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" class="scheda-img">
        </div>
        <div class="card">
            <span class="section-label">Tutorial Esercizi</span>
            <div class="grid-videos">
                <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="video-btn">CRUNCH</a>
                <a href="https://www.youtube.com/results?search_query=leg+press" target="_blank" class="video-btn">PRESSA</a>
                <a href="https://www.youtube.com/results?search_query=leg+extension" target="_blank" class="video-btn">LEG EXTENSION</a>
                <a href="https://www.youtube.com/results?search_query=goblet+squat" target="_blank" class="video-btn">SQUAT GOBLET</a>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">Wellness & Mind</span>
        <div class="extra-btns">
            <a href="https://www.youtube.com/results?search_query=yoga+italiano" target="_blank" class="btn-extra" style="background:var(--yoga)">YOGA</a>
            <a href="https://www.youtube.com/results?search_query=pilates+italiano" target="_blank" class="btn-extra" style="background:var(--pilates)">PILATES</a>
            <a href="https://www.youtube.com/results?search_query=meditazione+guidata" target="_blank" class="btn-extra" style="background:var(--mind)">MIND</a>
        </div>
    </div>
</div>

<script>
    // Gestione Tab
    function showTab(user) {
        document.querySelectorAll('.workout-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + user).classList.add('active');
        document.getElementById('tab-' + user).classList.add('active');
        localStorage.setItem('lastGymUser', user);
    }

    // Gestione Cronometro
    let timer;
    let timeLeft = 90;
    let isRunning = false;

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timer);
            document.getElementById('timerBtn').innerText = 'START';
        } else {
            timer = setInterval(updateTimer, 1000);
            document.getElementById('timerBtn').innerText = 'PAUSE';
        }
        isRunning = !isRunning;
    }

    function updateTimer() {
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert("Recupero terminato!");
            resetTimer();
            return;
        }
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('display').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function resetTimer() {
        clearInterval(timer);
        timeLeft = 90;
        isRunning = false;
        document.getElementById('display').innerText = "01:30";
        document.getElementById('timerBtn').innerText = 'START';
    }

    window.onload = () => {
        showTab(localStorage.getItem('lastGymUser') || 'max');
    };
</script>

</body>
</html>
