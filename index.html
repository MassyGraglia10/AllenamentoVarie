<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Hub Pro - Max & Lili</title>
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21;
            --max-primary: #007bff; --lili-primary: #d63384;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { text-align: center; padding: 20px; background: white; box-shadow: var(--shadow); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .user-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-user { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; font-size: 1rem; }
        .btn-max { background: var(--max-primary); }
        .btn-lili { background: var(--lili-primary); }
        .btn-user.active { outline: 3px solid #333; transform: scale(0.96); }

        #main-content { display: none; }
        .workout-section { display: none; }
        .workout-section.active { display: block; animation: fadeIn 0.4s; }

        .card { background: var(--card); border-radius: 16px; padding: 15px; box-shadow: var(--shadow); margin-bottom: 15px; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }

        /* CALENDARIO CON NOTE */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; font-size: 0.8rem; border-radius: 8px; background: #f8f9fa; cursor: pointer; border: 1px solid #eee; position: relative; }
        .cal-day.done { background: #28a745 !important; color: white; font-weight: bold; }
        .cal-day.has-note::after { content: '•'; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); color: white; font-size: 12px; }

        /* MODALE NOTE */
        #note-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 350px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; margin: 10px 0; font-family: inherit; }

        /* TIMER E VIDEO */
        .timer-card { max-width: 250px; margin: 0 auto 15px; text-align: center; }
        .timer-display { font-size: 2.2rem; font-weight: 900; margin: 5px 0; }
        .btn-act { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 0.8rem; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .song-btn { padding: 10px; color: white; text-align: center; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; min-height: 40px; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .v-link { background: #f0f2f5; padding: 12px; border-radius: 10px; text-decoration: none; color: #444; font-size: 0.75rem; font-weight: 700; text-align: center; border: 1px solid #e4e6eb; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.4rem;">💪 WORKOUT HUB</h1>
</div>

<div class="container">
    <div class="user-selector">
        <button id="btn-max" class="btn-user btn-max" onclick="showWorkout('max')">MASSIMO</button>
        <button id="btn-lili" class="btn-user btn-lili" onclick="showWorkout('lili')">LILIANA</button>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="section-title">Calendario Marzo 2026</div>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="card" id="playlist-card" style="display:none;">
            <div class="section-title">La tua Musica</div>
            <div id="music-grid" class="music-grid"></div>
            <div style="font-size: 0.6rem; color: #e74c3c; cursor: pointer; margin-top: 10px; text-align: right;" onclick="clearMusic()">Svuota lista</div>
        </div>

        <div class="card timer-card">
            <div class="timer-display" id="display">90s</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-act" style="background:#28a745;" id="tBtn" onclick="toggleTimer()">START</button>
                <button class="btn-act" style="background:#6c757d;" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div id="content-max" class="workout-section">
            <div class="card" style="text-align:center;">
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/main/Schedamassimo.jpg?raw=true" style="width:100%; max-width:250px; border-radius:10px;">
                <div class="section-title" style="margin-top:15px;">Tutorial</div>
                <div class="video-grid">
                    <a href="https://www.youtube.com/results?search_query=plank+tutorial" target="_blank" class="v-link">PLANK</a>
                    <a href="https://www.youtube.com/results?search_query=lat+machine+tutorial" target="_blank" class="v-link">LAT MACHINE</a>
                    <a href="https://www.youtube.com/results?search_query=pullover+tutorial" target="_blank" class="v-link">PULLOVER</a>
                    <a href="https://www.youtube.com/results?search_query=piegamenti+tutorial" target="_blank" class="v-link">PIEGAMENTI</a>
                </div>
            </div>
        </div>

        <div id="content-lili" class="workout-section">
            <div class="card" style="text-align:center;">
                <img src="https://github.com/MassyGraglia10/mio-health-hub/blob/dd5a72f80b644d956f67ce817b1ad39efbcde49c/schedaLiliana.jpg?raw=true" style="width:100%; max-width:250px; border-radius:10px;">
                <div class="section-title" style="margin-top:15px;">Tutorial</div>
                <div class="video-grid">
                    <a href="https://www.youtube.com/results?search_query=crunch+addominali" target="_blank" class="v-link">CRUNCH</a>
                    <a href="https://www.youtube.com/results?search_query=leg+press" target="_blank" class="v-link">PRESSA</a>
                    <a href="https://www.youtube.com/results?search_query=goblet+squat" target="_blank" class="v-link">SQUAT GOBLET</a>
                    <a href="https://www.youtube.com/results?search_query=chest+press" target="_blank" class="v-link">CHEST PRESS</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Wellness</div>
            <div class="video-grid">
                <a href="https://www.youtube.com/results?search_query=yoga+italiano" target="_blank" class="v-link">🧘 YOGA</a>
                <a href="https://www.youtube.com/results?search_query=pilates+italiano" target="_blank" class="v-link">🤸 PILATES</a>
                <a href="https://www.youtube.com/results?search_query=meditazione+guidata" target="_blank" class="v-link">🧠 MIND</a>
            </div>
        </div>

        <div class="card">
            <input type="text" id="mTitle" placeholder="Titolo Playlist">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="mLink" placeholder="Link Playlist Spotify..." style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd;">
                <button class="btn-act" style="background:#007bff;" onclick="addMusic()">OK</button>
            </div>
        </div>
    </div>
</div>

<div id="note-modal">
    <div class="modal-content">
        <h3 id="modal-date" style="margin-top:0;">Giorno X</h3>
        <textarea id="note-text" rows="4" placeholder="Cosa hai allenato?"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn-act" style="background:#28a745; flex:1;" onclick="saveNote()">SALVA</button>
            <button class="btn-act" style="background:#6c757d; flex:1;" onclick="closeModal()">CHIUDI</button>
        </div>
        <button onclick="deleteNote()" style="width:100%; background:none; border:none; color:red; margin-top:10px; font-size:0.7rem;">Elimina allenamento</button>
    </div>
</div>

<script>
    let currentUser = "";
    let selectedDay = null;

    function showWorkout(user) {
        currentUser = user;
        document.getElementById('main-content').style.display = 'block';
        document.querySelectorAll('.workout-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-user').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + user).classList.add('active');
        document.getElementById('btn-' + user).classList.add('active');
        renderCalendar();
        renderPlaylist();
    }

    // CALENDARIO E MODALE
    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = "";
        const data = JSON.parse(localStorage.getItem('data_' + currentUser) || "{}");

        for (let i = 1; i <= 31; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day' + (data[i] ? ' done' : '') + (data[i] && data[i].text ? ' has-note' : '');
            day.innerText = i;
            day.onclick = () => openModal(i);
            container.appendChild(day);
        }
    }

    function openModal(day) {
        selectedDay = day;
        const data = JSON.parse(localStorage.getItem('data_' + currentUser) || "{}");
        document.getElementById('modal-date').innerText = "Giorno " + day;
        document.getElementById('note-text').value = data[day] ? data[day].text : "";
        document.getElementById('note-modal').style.display = 'flex';
    }

    function saveNote() {
        let data = JSON.parse(localStorage.getItem('data_' + currentUser) || "{}");
        data[selectedDay] = { text: document.getElementById('note-text').value };
        localStorage.setItem('data_' + currentUser, JSON.stringify(data));
        closeModal();
        renderCalendar();
    }

    function deleteNote() {
        let data = JSON.parse(localStorage.getItem('data_' + currentUser) || "{}");
        delete data[selectedDay];
        localStorage.setItem('data_' + currentUser, JSON.stringify(data));
        closeModal();
        renderCalendar();
    }

    function closeModal() { document.getElementById('note-modal').style.display = 'none'; }

    // TIMER
    let timeLeft = 90; let timer; let running = false;
    function toggleTimer() {
        if(!running) { 
            timer = setInterval(() => { if(timeLeft > 0){ timeLeft--; document.getElementById('display').innerText = timeLeft + 's'; } else { clearInterval(timer); resetTimer(); alert('Recupero finito!'); } }, 1000); 
            document.getElementById('tBtn').innerText = 'PAUSE'; 
        } else { clearInterval(timer); document.getElementById('tBtn').innerText = 'START'; }
        running = !running;
    }
    function resetTimer() { clearInterval(timer); timeLeft = 90; running = false; document.getElementById('display').innerText = '90s'; document.getElementById('tBtn').innerText = 'START'; }

    // PLAYLIST
    function addMusic() {
        const title = document.getElementById('mTitle').value || "Playlist";
        const link = document.getElementById('mLink').value;
        if(link) {
            let list = JSON.parse(localStorage.getItem('playlist_' + currentUser) || "[]");
            list.push({ title: title.toUpperCase(), link: link });
            localStorage.setItem('playlist_' + currentUser, JSON.stringify(list));
            document.getElementById('mTitle').value = ""; document.getElementById('mLink').value = "";
            renderPlaylist();
        }
    }

    function renderPlaylist() {
        const list = JSON.parse(localStorage.getItem('playlist_' + currentUser) || "[]");
        const container = document.getElementById('music-grid');
        const card = document.getElementById('playlist-card');
        const color = currentUser === 'max' ? 'var(--max-primary)' : 'var(--lili-primary)';
        if(list.length > 0) {
            card.style.display = 'block';
            container.innerHTML = list.map(item => `<a class="song-btn" style="background:${color}" href="${item.link}" target="_blank">${item.title}</a>`).join('');
        } else { card.style.display = 'none'; }
    }

    function clearMusic() { localStorage.removeItem('playlist_' + currentUser); renderPlaylist(); }
</script>
</body>
</html>
